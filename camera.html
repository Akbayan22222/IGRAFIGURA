<!DOCTYPE html>
<html>
<head>
    <title>Wall Game - Camera</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: #0ff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        input { padding: 15px; font-size: 18px; width: 80%; margin-bottom: 20px; border: 1px solid #0ff; background: #000; color: #0ff; }
        button { padding: 15px 30px; font-size: 18px; background: #0ff; color: #000; border: none; font-weight: bold; }
        #video_preview { width: 90%; border: 2px solid #333; margin-top: 20px; transform: scaleX(1); }
    </style>
</head>
<body>
    <h2>КОНТРОЛЛЕР</h2>
    <input type="text" id="target-id" placeholder="ID с экрана ноутбука">
    <br>
    <button onclick="connect()">ПОДКЛЮЧИТЬ КАМЕРУ</button>
    <video id="video_preview"></video>

    <script>
        const peer = new Peer();
        let conn;
        const videoElement = document.getElementById('video_preview');

        function connect() {
            const id = document.getElementById('target-id').value;
            conn = peer.connect(id);
            alert("Связь установлена! Используется задняя камера.");
        }

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });

        pose.onResults(results => {
            if (results.poseLandmarks && conn && conn.open) {
                const nose = results.poseLandmarks[0];
                // Отправляем координаты (инвертируем X, так как камера сзади)
                conn.send({
                    x: (nose.x - 0.5) * 12,
                    y: (0.5 - nose.y) * 10
                });
            }
        });

        // ВКЛЮЧАЕМ ИМЕННО ЗАДНЮЮ КАМЕРУ (environment)
        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640, height: 480,
            facingMode: "environment" 
        });
        camera.start();
    </script>
</body>
</html>
