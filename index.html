<!DOCTYPE html>
<html>
<head>
    <title>Wall Game - Projector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #0ff; font-size: 40px; text-shadow: 0 0 20px #0ff; }
        #peer-info { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #444; font-size: 18px; }
        #my-id { color: #f0f; font-weight: bold; border: 1px solid #f0f; padding: 5px 10px; }
    </style>
</head>
<body>
    <div id="ui">ДИСТАНЦИЯ: <span id="dist">0</span>m</div>
    <div id="peer-info">Введите этот ID на телефоне: <span id="my-id">ожидание...</span></div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Игрок (Неоновый шар)
        const player = new THREE.Mesh(
            new THREE.SphereGeometry(0.5, 32, 32), 
            new THREE.MeshBasicMaterial({color: 0x00ff00})
        );
        scene.add(player);

        // Стена (Сетка)
        const wall = new THREE.Mesh(
            new THREE.BoxGeometry(12, 12, 0.2), 
            new THREE.MeshBasicMaterial({color: 0xff00ff, wireframe: true})
        );
        scene.add(wall);
        wall.position.z = -20;

        camera.position.set(0, 1.5, 5);

        // СВЯЗЬ
        const peer = new Peer();
        peer.on('open', id => document.getElementById('my-id').innerText = id);
        
        peer.on('connection', conn => {
            conn.on('data', data => {
                // Принимаем координаты x и y от телефона
                player.position.x = data.x;
                player.position.y = data.y;
            });
        });

        let distance = 0;
        function animate() {
            requestAnimationFrame(animate);
            wall.position.z += 0.15;
            distance += 0.1;
            document.getElementById('dist').innerText = Math.floor(distance);

            if (wall.position.z > 5) wall.position.z = -25;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
