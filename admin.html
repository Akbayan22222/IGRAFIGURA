<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
    }

    h1 {
      margin: 0 0 20px 0;
    }

    button {
      width: 320px;
      height: 80px;
      border: none;
      border-radius: 20px;
      font-size: 26px;
      font-weight: bold;
      cursor: pointer;
    }

    .start { background: #28a745; color: white; }
    .stop { background: #ff3b30; color: white; }
    .next { background: #007bff; color: white; }
  </style>
</head>
<body>
  <h1>ADMIN PANEL</h1>
  <button class="start">СТАРТ</button>
  <button class="stop">ПАУЗА</button>
  <button class="next">СЛЕДУЮЩАЯ ПОЗА</button>
</body>
</html>
